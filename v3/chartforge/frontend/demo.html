<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ChartForge v3</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts-wordcloud@2.1.0/dist/echarts-wordcloud.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0b0f;--surface:#12131a;--surface2:#1a1b24;--surface3:#22232e;
  --border:#2a2b38;--border-hover:#3a3b4a;
  --text:#e8e9f0;--text-dim:#8b8d9e;--text-muted:#5a5c6e;
  --accent:#4f7df9;--accent-glow:#4f7df940;--accent-dim:#3a5ec0;
  --green:#34d399;--amber:#fbbf24;--rose:#f87171;--violet:#a78bfa;
  --cyan:#22d3ee;--orange:#fb923c;
  --radius:12px;--radius-lg:20px;
}
html{font-size:15px;scroll-behavior:smooth}
body{
  font-family:'Noto Sans KR',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;
  background-image:
    radial-gradient(ellipse 80% 60% at 50% -20%, #4f7df912 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, #a78bfa08 0%, transparent 50%);
}

/* ── Header ── */
header{
  padding:2rem 2rem 1rem;max-width:1400px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
}
.logo{display:flex;align-items:center;gap:.75rem}
.logo-icon{
  width:40px;height:40px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--violet));
  display:grid;place-items:center;font-size:1.2rem;
  box-shadow:0 4px 20px var(--accent-glow);
}
.logo h1{
  font-family:'Playfair Display',serif;font-weight:900;font-size:1.5rem;
  background:linear-gradient(135deg,var(--text),var(--text-dim));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.badge-group{display:flex;gap:.5rem;align-items:center}
.badge{
  padding:.35rem .75rem;border-radius:99px;font-size:.7rem;font-weight:600;
  letter-spacing:.05em;
}
.badge.ai{background:var(--accent-glow);color:var(--accent)}
.badge.echarts{background:#e4393520;color:#e43935}

/* ── Upload Zone ── */
.upload-section{max-width:1400px;margin:1.5rem auto;padding:0 2rem}
.upload-zone{
  border:2px dashed var(--border);border-radius:var(--radius-lg);
  padding:3.5rem 2rem;text-align:center;cursor:pointer;
  transition:all .3s ease;position:relative;overflow:hidden;
  background:var(--surface);
}
.upload-zone::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50% 50%,var(--accent-glow),transparent 70%);
  opacity:0;transition:opacity .3s;
}
.upload-zone:hover,.upload-zone.dragover{
  border-color:var(--accent);transform:translateY(-2px);
  box-shadow:0 8px 40px var(--accent-glow);
}
.upload-zone:hover::before,.upload-zone.dragover::before{opacity:1}
.upload-zone *{position:relative;z-index:1}
.upload-icon{font-size:3rem;margin-bottom:1rem;display:block}
.upload-title{font-size:1.2rem;font-weight:600;margin-bottom:.5rem}
.upload-sub{color:var(--text-dim);font-size:.85rem}
.upload-formats{
  margin-top:1rem;display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;
}
.format-tag{
  padding:.25rem .6rem;border-radius:6px;font-size:.7rem;font-weight:500;
  background:var(--surface3);color:var(--text-dim);
  font-family:'JetBrains Mono',monospace;
}
input[type=file]{display:none}

/* ── Loading / Progress Panel ── */
.loading-overlay{
  display:none;position:fixed;inset:0;z-index:9999;
  background:rgba(10,11,15,.92);
  place-items:center;backdrop-filter:blur(8px);
}
.loading-overlay.active{display:grid}
.loader{text-align:center;max-width:420px;width:90%}
.spinner{
  width:48px;height:48px;border:3px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .8s linear infinite;margin:0 auto 1rem;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loader p{color:var(--text-dim);font-size:.9rem}
.progress-steps{margin-top:1.2rem;text-align:left}
.p-step{
  display:flex;align-items:center;gap:.65rem;padding:.4rem 0;
  font-size:.8rem;color:var(--text-muted);transition:all .2s;
}
.p-step.active{color:var(--accent);font-weight:600}
.p-step.done{color:var(--green)}
.p-step .p-icon{width:18px;text-align:center;font-size:.85rem}
.p-step .p-label{flex:1}
.p-step .p-time{font-family:'JetBrains Mono',monospace;font-size:.65rem;min-width:42px;text-align:right;color:var(--text-muted)}
.p-step.active .p-icon{animation:pulse 1s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.p-bar{margin-top:1rem;height:4px;border-radius:2px;background:var(--surface3);overflow:hidden}
.p-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--violet));border-radius:2px;transition:width .3s;width:0%}

/* ── Results Layout ── */
.results{display:none;max-width:1400px;margin:0 auto;padding:0 2rem 4rem}
.results.active{display:block}
.section-title{
  font-size:1.3rem;font-weight:700;margin:2.5rem 0 1rem;
  display:flex;align-items:center;gap:.6rem;
}
.section-title span{font-size:1.1rem}

/* ── File Summary ── */
.file-summary{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:1rem;margin-bottom:.5rem;
}
.stat-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:1.2rem;
}
.stat-card .label{font-size:.75rem;color:var(--text-muted);font-weight:500;text-transform:uppercase;letter-spacing:.06em}
.stat-card .value{font-size:1.6rem;font-weight:700;margin-top:.3rem;font-family:'JetBrains Mono',monospace}
.stat-card .value.accent{color:var(--accent)}
.stat-card .value.green{color:var(--green)}
.stat-card .value.amber{color:var(--amber)}

/* ── Column Cards ── */
.columns-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;
}
.col-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:1.2rem;transition:all .2s;
}
.col-card:hover{border-color:var(--border-hover);transform:translateY(-1px)}
.col-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem}
.col-name{font-weight:600;font-size:.95rem;font-family:'JetBrains Mono',monospace}
/* Column toggle */
.col-toggle{
  width:36px;height:20px;border-radius:10px;border:none;cursor:pointer;
  background:var(--green);position:relative;transition:background .2s;flex-shrink:0;
}
.col-toggle::after{
  content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;
  border-radius:50%;background:#fff;transition:transform .2s;
}
.col-toggle.off{background:var(--surface3)}
.col-toggle.off::after{transform:translateX(16px);background:var(--text-muted)}
.col-card.disabled{opacity:.4;filter:grayscale(.6)}
.col-card.disabled .col-color-row,.col-card.disabled .val-colors-section,.col-card.disabled .col-samples{display:none}
.col-color-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.7rem}
.col-color-swatch{
  width:28px;height:28px;border-radius:8px;border:2px solid var(--border);
  cursor:pointer;transition:all .15s;position:relative;flex-shrink:0;
}
.col-color-swatch:hover{transform:scale(1.12);border-color:var(--border-hover);box-shadow:0 2px 12px rgba(0,0,0,.4)}
.col-color-swatch input[type=color]{
  position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;border:none;padding:0;
}
.col-color-label{font-size:.72rem;color:var(--text-muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase}
.col-type{
  padding:.2rem .55rem;border-radius:6px;font-size:.65rem;font-weight:600;
  text-transform:uppercase;letter-spacing:.04em;
}
.col-type.numeric{background:#34d39920;color:var(--green)}
.col-type.temporal{background:#4f7df920;color:var(--accent)}
.col-type.categorical,.col-type.low_cardinality{background:#fbbf2420;color:var(--amber)}
.col-type.binary{background:#a78bfa20;color:var(--violet)}
.col-type.high_cardinality{background:#f8717120;color:var(--rose)}
.col-type.empty{background:var(--surface3);color:var(--text-muted)}
.col-meta{font-size:.78rem;color:var(--text-dim);line-height:1.6}
.col-meta strong{color:var(--text);font-weight:500}
.col-samples{margin-top:.6rem;display:flex;gap:.35rem;flex-wrap:wrap}
.sample-chip{
  padding:.15rem .45rem;border-radius:4px;font-size:.68rem;
  background:var(--surface3);color:var(--text-dim);
  font-family:'JetBrains Mono',monospace;max-width:120px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.val-colors-section{margin-top:.7rem;border-top:1px solid var(--border);padding-top:.6rem}
.val-colors-title{font-size:.68rem;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem}
.val-colors-grid{display:flex;flex-wrap:wrap;gap:.4rem}
.val-color-chip{
  display:flex;align-items:center;gap:.3rem;
  padding:.2rem .45rem .2rem .2rem;border-radius:6px;
  background:var(--surface2);border:1px solid var(--border);
  cursor:default;transition:all .15s;font-size:.7rem;
}
.val-color-chip:hover{border-color:var(--border-hover);background:var(--surface3)}
.val-color-dot{
  width:16px;height:16px;border-radius:5px;flex-shrink:0;
  border:1.5px solid var(--border);cursor:pointer;position:relative;
  transition:transform .12s;
}
.val-color-dot:hover{transform:scale(1.2);border-color:var(--text-muted)}
.val-color-dot input[type=color]{
  position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;border:none;padding:0;
}
.val-color-name{color:var(--text-dim);font-family:'JetBrains Mono',monospace;white-space:nowrap;max-width:80px;overflow:hidden;text-overflow:ellipsis}

/* ── Recommendations ── */
.recs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(440px,1fr));gap:1.25rem}
.rec-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);overflow:hidden;transition:all .25s;position:relative;
}
.rec-card:hover{border-color:var(--accent);box-shadow:0 4px 24px var(--accent-glow)}
.rec-card.full-width{grid-column:1 / -1}
.rec-card.col-hidden{display:none}
.rec-card-head{
  padding:1rem 1.2rem;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
  transition:border-radius .25s;
}
.rec-card.collapsed .rec-card-head{border-bottom-color:transparent;border-radius:var(--radius-lg)}
.rec-info{display:flex;align-items:center;gap:.6rem;flex:1;min-width:0;cursor:pointer;user-select:none;padding:.15rem 0;border-radius:6px;transition:background .12s}
.rec-info:hover{background:var(--surface2)}
.rec-icon{font-size:1.3rem}
.rec-title{font-weight:700;font-size:.95rem}
.rec-subtitle{font-size:.7rem;color:var(--text-dim);margin-top:.1rem}
.rec-actions{display:flex;align-items:center;gap:.4rem;flex-shrink:0}
.rec-score{
  font-family:'JetBrains Mono',monospace;font-weight:700;font-size:.8rem;
  padding:.25rem .6rem;border-radius:8px;
}
.rec-score.high{background:#34d39920;color:var(--green)}
.rec-score.mid{background:#4f7df920;color:var(--accent)}
.rec-score.low{background:#fbbf2420;color:var(--amber)}
/* Collapse button */
.collapse-btn{
  width:28px;height:28px;border-radius:6px;border:none;cursor:pointer;
  background:transparent;color:var(--text-dim);font-size:.85rem;
  display:grid;place-items:center;transition:all .15s;
}
.collapse-btn:hover{background:var(--surface3);color:var(--text)}
.rec-card.collapsed .collapse-btn{transform:rotate(-90deg)}
/* Menu button + dropdown */
.menu-btn{
  width:28px;height:28px;border-radius:6px;border:none;cursor:pointer;
  background:transparent;color:var(--text-dim);font-size:1.1rem;
  display:grid;place-items:center;transition:all .15s;letter-spacing:-1px;
}
.menu-btn:hover{background:var(--surface3);color:var(--text)}
.menu-wrap{position:relative}
.menu-dropdown{
  display:none;position:fixed;z-index:9000;
  min-width:200px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius);box-shadow:0 8px 32px rgba(0,0,0,.5);
  padding:.35rem 0;
}
#active-menu{
  display:block;position:fixed;z-index:9000;
  min-width:200px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius);box-shadow:0 12px 40px rgba(0,0,0,.6);
  padding:.35rem 0;
}
.menu-dropdown.open{display:block}
.menu-item{
  display:flex;align-items:center;gap:.6rem;padding:.55rem 1rem;
  font-size:.8rem;color:var(--text-dim);cursor:pointer;transition:all .1s;
  border:none;background:none;width:100%;text-align:left;font-family:inherit;
}
.menu-item:hover{background:var(--surface3);color:var(--text)}
.menu-item .mi-icon{font-size:.95rem;width:1.2rem;text-align:center}
/* Body + collapse */
.rec-body{padding:1rem 1.2rem;overflow:hidden;transition:max-height .35s ease,opacity .25s ease,padding .3s ease;max-height:800px;opacity:1}
.rec-card.collapsed .rec-body{max-height:0;opacity:0;padding-top:0;padding-bottom:0}
.rec-reason{font-size:.8rem;color:var(--text-dim);margin-bottom:.8rem;line-height:1.5}
.rec-mapping{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.8rem}
.mapping-tag{
  display:flex;align-items:center;gap:.3rem;
  padding:.2rem .5rem;border-radius:6px;font-size:.68rem;
  background:var(--surface3);
}
.mapping-tag .axis{color:var(--text-muted);font-weight:600;font-size:.58rem;text-transform:uppercase}
.mapping-tag .field{color:var(--text);font-family:'JetBrains Mono',monospace;font-weight:500}
.chart-container{
  width:100%;height:300px;background:var(--surface2);
  border-radius:var(--radius);position:relative;overflow:hidden;
}
/* Overlay sits above ECharts canvas, transparent to clicks by default */
.chart-overlay{
  position:absolute;inset:0;z-index:10;pointer-events:none;
  border-radius:var(--radius);
}
.chart-overlay.draw-mode{pointer-events:auto;cursor:crosshair}
/* All child elements receive events */
.chart-overlay > *{pointer-events:auto}

/* Toolbar floating inside chart — hidden until hover */
.chart-toolbar{
  position:absolute;top:6px;right:6px;z-index:20;
  display:flex;gap:3px;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:3px;opacity:0;transition:opacity .25s;pointer-events:none;
}
.chart-container:hover .chart-toolbar{opacity:1;pointer-events:auto}
.tb-btn{
  width:26px;height:26px;border:none;border-radius:5px;cursor:pointer;
  background:transparent;color:var(--text-dim);font-size:.8rem;
  display:grid;place-items:center;transition:all .12s;
}
.tb-btn:hover{background:var(--surface3);color:var(--text)}
.tb-btn.active{background:var(--accent-glow);color:var(--accent)}
.tb-btn[title]:hover::after{content:attr(title);position:absolute;top:100%;right:0;margin-top:4px;
  background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);
  font-size:.65rem;padding:.2rem .5rem;border-radius:4px;white-space:nowrap;pointer-events:none;z-index:99}

/* Annotations (memos) */
.chart-anno{
  position:absolute;z-index:15;max-width:220px;
  background:none;
  border:none;color:var(--text);
  font-size:.72rem;font-weight:500;
  padding:.3rem .4rem .3rem .45rem;border-radius:6px;
  display:flex;align-items:center;gap:.25rem;line-height:1.3;
  font-family:'Noto Sans KR',system-ui,sans-serif;
  transition:box-shadow .15s;user-select:none;
}
.chart-anno:hover{box-shadow:0 2px 12px rgba(251,191,36,0.25)}
.chart-anno.dragging{opacity:.8;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.chart-anno .a-text{flex:1;word-break:break-word}
/* Grip handle (shared style) — hidden until parent hover */
.ov-grip{
  width:16px;height:16px;border-radius:3px;flex-shrink:0;
  display:grid;place-items:center;cursor:grab;
  color:var(--text-muted);font-size:.7rem;opacity:0;transition:all .15s;
}
.chart-anno:hover .ov-grip,
.chart-hline:hover .ov-grip,
.chart-vline:hover .ov-grip,
.chart-rect:hover .ov-grip{opacity:.6}
.ov-grip:hover{opacity:1!important;background:rgba(255,255,255,.08)}
.dragging .ov-grip{cursor:grabbing;opacity:.8!important}
/* Close button (shared style) — hidden until parent hover */
.ov-close{
  width:16px;height:16px;border-radius:3px;flex-shrink:0;
  display:grid;place-items:center;cursor:pointer;
  color:var(--text-muted);font-size:.7rem;opacity:0;transition:all .15s;
}
.chart-anno:hover .ov-close,
.chart-hline:hover .ov-close,
.chart-vline:hover .ov-close,
.chart-rect:hover .ov-close{opacity:.5}
.ov-close:hover{opacity:1!important;background:var(--rose);color:#fff}

/* Dashed lines */
.chart-hline,.chart-vline{position:absolute;z-index:14}
.chart-hline{
  left:0;right:0;height:0;border-top:0.5px dashed var(--rose);
  padding:5px 0;margin-top:-5px;
}
.chart-vline{
  top:0;bottom:0;width:0;border-left:0.5px dashed var(--rose);
  padding:0 5px;margin-left:-5px;
}
/* Line controls group — hidden until hover */
.line-controls{
  position:absolute;display:flex;gap:2px;
  background:var(--surface);border:1px solid var(--border);border-radius:5px;
  padding:1px;opacity:0;transition:opacity .15s;
}
.chart-hline:hover .line-controls,
.chart-vline:hover .line-controls{opacity:1}
.chart-hline .line-controls{right:4px;top:-11px}
.chart-vline .line-controls{top:4px;left:-11px;flex-direction:column}

/* Dashed rectangle */
.chart-rect{
  position:absolute;z-index:13;
  border:0.5px dashed var(--rose);border-radius:4px;
  background:rgba(248,113,113,0.04);
  min-width:30px;min-height:20px;
}
.rect-controls{
  position:absolute;top:-10px;right:-10px;display:flex;gap:2px;
  background:var(--surface);border:1px solid var(--border);border-radius:5px;
  padding:1px;opacity:0;transition:opacity .15s;
}
.chart-rect:hover .rect-controls{opacity:1}
.chart-rect .rect-resize{
  position:absolute;bottom:-4px;right:-4px;width:10px;height:10px;
  background:var(--rose);border-radius:2px;cursor:nwse-resize;
  opacity:0;transition:opacity .15s;
}
.chart-rect:hover .rect-resize{opacity:1}

/* Annotation input */
.anno-input{
  position:absolute;z-index:60;
  background:var(--surface);border:2px solid var(--amber);color:var(--text);
  font-size:.8rem;padding:.4rem .6rem;border-radius:8px;
  width:180px;outline:none;font-family:inherit;
  box-shadow:0 4px 16px rgba(0,0,0,.5);pointer-events:auto;
}

/* ── Data Preview Table ── */
.table-wrap{
  overflow:auto;border-radius:var(--radius);border:1px solid var(--border);max-height:420px;
}
.table-wrap table{width:100%;border-collapse:collapse;font-size:.8rem}
.table-wrap th{
  position:sticky;top:0;z-index:2;
  background:var(--surface2);color:var(--text-dim);font-weight:600;
  padding:.7rem 1rem;text-align:left;white-space:nowrap;
  border-bottom:2px solid var(--border);
  font-family:'JetBrains Mono',monospace;font-size:.72rem;
  text-transform:uppercase;letter-spacing:.04em;
}
.table-wrap td{
  padding:.55rem 1rem;border-bottom:1px solid var(--border);
  white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis;
}
.table-wrap tr:hover td{background:var(--surface2)}
.table-wrap td.null{color:var(--text-muted);font-style:italic}

/* ── Responsive ── */
@media(max-width:768px){
  header,.upload-section,.results{padding-left:1rem;padding-right:1rem}
  .recs-grid{grid-template-columns:1fr}
  .file-summary{grid-template-columns:repeat(2,1fr)}
}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:fadeUp .5s ease forwards;opacity:0}
.delay-1{animation-delay:.1s}.delay-2{animation-delay:.2s}.delay-3{animation-delay:.3s}

/* ── Overlay Properties Panel ── */
.ov-props{
  position:absolute;z-index:60;
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:.7rem;min-width:170px;box-shadow:0 8px 32px rgba(0,0,0,.5);
  font-size:.75rem;color:var(--text-dim);pointer-events:auto;
}
.props-title{font-weight:700;font-size:.8rem;color:var(--text);margin-bottom:.5rem;padding-bottom:.4rem;border-bottom:1px solid var(--border)}
.ov-props label{display:flex;align-items:center;gap:.4rem;margin-bottom:.4rem}
.ov-props label span{font-size:.65rem;color:var(--text-muted);min-width:28px;text-align:right;font-family:'JetBrains Mono',monospace}
.ov-props input[type=range]{flex:1;height:4px;accent-color:var(--accent)}
.ov-props input[type=color]{width:24px;height:20px;border:1px solid var(--border);border-radius:4px;padding:0;cursor:pointer;background:transparent}
.props-btn{
  display:block;width:100%;padding:.35rem;margin-top:.3rem;border:none;border-radius:6px;
  background:var(--surface3);color:var(--text-dim);font-size:.72rem;cursor:pointer;
  font-family:inherit;transition:all .1s;text-align:center;
}
.props-btn:hover{background:var(--surface2);color:var(--text)}
.props-btn.close{margin-top:.5rem;color:var(--text-muted)}
.props-row{display:flex;gap:.3rem;margin-top:.3rem}
.props-row .props-btn{flex:1}
</style></head><body>


<header>

  <div class="section-title animate-in delay-2"><span>✨</span> 추천 차트</div>
  <div class="recs-grid" id="recsGrid"></div>
  <div class="section-title animate-in delay-3"><span>📄</span> 데이터 미리보기</div>
  <div class="table-wrap" id="tableWrap"></div>
</section>


<script>
// ═══ config.js ═══
// ChartForge — config.js
// API endpoint, ECharts theme, palette, global utilities

const API_BASE = "";  // Same origin — run.py serves both

// ─────────────────────────────────────────────────────
// Apache ECharts — Dark Theme & Palette
// ─────────────────────────────────────────────────────
const PALETTE = ['#4f7df9','#34d399','#fbbf24','#f87171','#a78bfa','#22d3ee','#fb923c','#ec4899','#6ee7b7','#93c5fd'];

const ECHARTS_THEME = {
  backgroundColor: 'transparent',
  textStyle: { color: '#8b8d9e', fontFamily: "'Noto Sans KR', system-ui" },
  title: { textStyle: { color: '#8b8d9e', fontSize: 12, fontWeight: 500 } },
  legend: {
    textStyle: { color: '#8b8d9e', fontSize: 11 },
    pageTextStyle: { color: '#8b8d9e' },
    icon: 'roundRect',
    itemWidth: 12, itemHeight: 8,
  },
  tooltip: {
    backgroundColor: '#1a1b24ee',
    borderColor: '#2a2b38',
    textStyle: { color: '#e8e9f0', fontSize: 12 },
    borderWidth: 1,
  },
  categoryAxis: {
    axisLine: { lineStyle: { color: '#2a2b3860' } },
    axisTick: { lineStyle: { color: '#2a2b3860' } },
    axisLabel: { color: '#8b8d9e', fontSize: 10 },
    splitLine: { lineStyle: { color: '#2a2b3830' } },
  },
  valueAxis: {
    axisLine: { show: false },
    axisTick: { show: false },
    axisLabel: { color: '#8b8d9e', fontSize: 10 },
    splitLine: { lineStyle: { color: '#2a2b3825', type: 'dashed' } },
  },
};

echarts.registerTheme('chartforge', ECHARTS_THEME);

// Track ECharts instances for cleanup
const chartInstances = [];

function fmtNum(v) {
  if (v==null) return '-';
  const n = Number(v);
  if (isNaN(n)) return String(v);
  if (Math.abs(n)>=1e6) return (n/1e6).toFixed(1)+'M';
  if (Math.abs(n)>=1e3) return (n/1e3).toFixed(1)+'K';
  return Number.isInteger(n) ? String(n) : n.toFixed(2);
}

// ═══ colors.js ═══
// ChartForge — colors.js
// Column & value color management

// ─────────────────────────────────────────────────────
// Column Color System
// ─────────────────────────────────────────────────────
const columnColors = {};   // colName → hex color
const valueColors  = {};   // "colName::value" → hex color
const disabledColumns = new Set(); // columns excluded from charts
let currentData = null;    // latest analysis result

// Column-level color
function C(colName) {
  return columnColors[colName] || PALETTE[0];
}

// Value-level color: VC("카테고리", "전자제품") → color
function VC(colName, value) {
  const key = colName + '::' + String(value);
  return valueColors[key] || Pi(0);
}

// Get ordered palette from all column colors
function CP() {
  if (!currentData) return PALETTE;
  return currentData.column_analysis.map(c => columnColors[c.name] || PALETTE[0]);
}

// Get color at index i from dynamic palette
function Pi(i) {
  const p = CP();
  return p[i % p.length];
}

// Assign default colors to columns
function initColumnColors(cols) {
  cols.forEach((c, i) => {
    if (!columnColors[c.name]) {
      columnColors[c.name] = PALETTE[i % PALETTE.length];
    }
  });
}

// Assign default colors to category values within each column
function initValueColors(cols) {
  cols.forEach(c => {
    if (!c.top_values) return;
    const vals = Object.keys(c.top_values);
    vals.forEach((v, vi) => {
      const key = c.name + '::' + v;
      if (!valueColors[key]) {
        valueColors[key] = PALETTE[vi % PALETTE.length];
      }
    });
  });
}

// Re-render all charts with current colors
function reRenderCharts() {
  if (!currentData) return;
  chartInstances.forEach(c => c.dispose());
  chartInstances.length = 0;
  // Only re-render the ECharts, not the DOM cards
  currentData.recommendations.forEach((rec, i) => {
    try { buildEChart(`echart-${i}`, rec, currentData.preview); } catch(e) {}
  });
}

// ═══ overlay.js ═══
// ChartForge — overlay.js v3
// Overlays with properties panel, memo editing, copy, rotate, save/load

let _drag = null;

// ── Container dblclick → memo ──
function onContainerDblClick(e, idx) {
  if (_drag) return;
  const tgt = e.target;
  // Double-click on existing memo → edit
  const anno = tgt.closest('.chart-anno');
  if (anno) { _editMemo(anno); return; }
  if (tgt.closest('.chart-toolbar,.chart-hline,.chart-vline,.chart-rect,.anno-input,.ov-props')) return;
  e.preventDefault(); e.stopPropagation();
  const overlay = document.getElementById(`overlay-${idx}`);
  if (!overlay) return;
  _spawnMemoInput(overlay, e.clientX, e.clientY);
}

function startMemo(idx) {
  const overlay = document.getElementById(`overlay-${idx}`);
  if (!overlay) return;
  const r = overlay.getBoundingClientRect();
  _spawnMemoInput(overlay, r.left + r.width/2, r.top + r.height/2);
}

function _spawnMemoInput(overlay, cx, cy, existingEl, existingText) {
  overlay.querySelectorAll('.anno-input').forEach(el => el.remove());
  const rect = overlay.getBoundingClientRect();
  const x = cx - rect.left, y = cy - rect.top;
  const input = document.createElement('input');
  input.className = 'anno-input';
  input.style.left = x + 'px'; input.style.top = y + 'px';
  input.style.pointerEvents = 'auto';
  input.value = existingText || '';
  input.placeholder = '메모 입력 후 Enter...';
  overlay.appendChild(input);
  setTimeout(() => { input.focus(); input.select(); }, 30);
  const commit = () => {
    const t = input.value.trim();
    if (existingEl) {
      if (t) { existingEl.querySelector('.a-text').textContent = t; existingEl.style.display = ''; }
      else existingEl.remove();
    } else if (t) addAnno(overlay, x, y, t);
    if (input.parentElement) input.remove();
  };
  input.onkeydown = (ev) => { if (ev.key==='Enter'){ev.preventDefault();commit()} else if(ev.key==='Escape'){if(existingEl)existingEl.style.display='';input.remove()} };
  input.onblur = () => setTimeout(commit, 80);
}

function _editMemo(anno) {
  const text = anno.querySelector('.a-text')?.textContent || '';
  const overlay = anno.parentElement;
  const r = anno.getBoundingClientRect();
  const or = overlay.getBoundingClientRect();
  anno.style.display = 'none';
  _spawnMemoInput(overlay, r.left, r.top, anno, text);
}

// ── Memo ──
function addAnno(overlay, x, y, text, props) {
  const el = document.createElement('div');
  el.className = 'chart-anno'; el.dataset.type = 'anno';
  el.style.left = Math.max(0,x-8)+'px'; el.style.top = Math.max(0,y-28)+'px';
  if (props?.color) el.style.color = props.color;
  if (props?.fontSize) el.style.fontSize = props.fontSize + 'px';
  el.innerHTML = `<span class="ov-grip" title="드래그">⠿</span><span class="a-text">${text}</span><span class="ov-close" title="삭제">✕</span>`;
  overlay.appendChild(el);
  el.querySelector('.ov-close').onmousedown = (e) => { e.stopPropagation(); el.remove(); };
  _bindDrag(el, overlay, 'anno', '.ov-grip');
  // Right-click → properties
  el.oncontextmenu = (e) => { e.preventDefault(); _showProps(el, overlay, 'anno'); };
}

// ── Lines ──
function addHLine(idx, posY, props) {
  const overlay = document.getElementById(`overlay-${idx}`);
  if (!overlay) return;
  const el = document.createElement('div');
  el.className = 'chart-hline'; el.dataset.type = 'hline';
  const n = overlay.querySelectorAll('.chart-hline').length;
  el.style.top = (posY!=null ? posY : Math.round(overlay.offsetHeight*(0.3+n*0.1)))+'px';
  _applyLineProps(el, props);
  el.innerHTML = `<div class="line-controls"><span class="ov-grip" title="드래그">⠿</span><span class="ov-close" title="삭제">✕</span></div>`;
  overlay.appendChild(el);
  el.querySelector('.ov-close').onmousedown = (e) => { e.stopPropagation(); el.remove(); };
  _bindDrag(el, overlay, 'hline', '.ov-grip');
  el.oncontextmenu = (e) => { e.preventDefault(); _showProps(el, overlay, 'hline'); };
}

function addVLine(idx, posX, props) {
  const overlay = document.getElementById(`overlay-${idx}`);
  if (!overlay) return;
  const el = document.createElement('div');
  el.className = 'chart-vline'; el.dataset.type = 'vline';
  const n = overlay.querySelectorAll('.chart-vline').length;
  el.style.left = (posX!=null ? posX : Math.round(overlay.offsetWidth*(0.3+n*0.1)))+'px';
  _applyLineProps(el, props, true);
  el.innerHTML = `<div class="line-controls"><span class="ov-grip" title="드래그">⠿</span><span class="ov-close" title="삭제">✕</span></div>`;
  overlay.appendChild(el);
  el.querySelector('.ov-close').onmousedown = (e) => { e.stopPropagation(); el.remove(); };
  _bindDrag(el, overlay, 'vline', '.ov-grip');
  el.oncontextmenu = (e) => { e.preventDefault(); _showProps(el, overlay, 'vline'); };
}

function _applyLineProps(el, props, isVertical) {
  const w = props?.lineWidth || 0.5;
  const c = props?.lineColor || 'var(--rose)';
  if (isVertical) el.style.borderLeft = `${w}px dashed ${c}`;
  else el.style.borderTop = `${w}px dashed ${c}`;
}

// ── Rectangle ──
function addRect(idx, posX, posY, rw, rh, props) {
  const overlay = document.getElementById(`overlay-${idx}`);
  if (!overlay) return;
  const w = overlay.offsetWidth, h = overlay.offsetHeight;
  const el = document.createElement('div');
  el.className = 'chart-rect'; el.dataset.type = 'rect';
  const n = overlay.querySelectorAll('.chart-rect').length;
  el.style.left = (posX!=null?posX:Math.round(w*0.2+n*20))+'px';
  el.style.top = (posY!=null?posY:Math.round(h*0.2+n*20))+'px';
  el.style.width = (rw!=null?rw:Math.round(w*0.4))+'px';
  el.style.height = (rh!=null?rh:Math.round(h*0.4))+'px';
  _applyRectProps(el, props);
  el.innerHTML = `<div class="rect-controls"><span class="ov-grip" title="드래그">⠿</span><span class="ov-close" title="삭제">✕</span></div><span class="rect-resize"></span>`;
  overlay.appendChild(el);
  el.querySelector('.ov-close').onmousedown = (e) => { e.stopPropagation(); el.remove(); };
  _bindDrag(el, overlay, 'rect', '.ov-grip');
  el.querySelector('.rect-resize').onmousedown = (e) => {
    e.stopPropagation(); e.preventDefault();
    _drag = { type:'resize', el, startW:el.offsetWidth, startH:el.offsetHeight, startX:e.clientX, startY:e.clientY };
  };
  el.oncontextmenu = (e) => { e.preventDefault(); _showProps(el, overlay, 'rect'); };
}

function _applyRectProps(el, props) {
  const w = props?.lineWidth || 0.5;
  const c = props?.lineColor || 'var(--rose)';
  const fill = props?.fillColor || 'transparent';
  const opacity = props?.fillOpacity ?? 0.04;
  const rot = props?.rotate || 0;
  el.style.border = `${w}px dashed ${c}`;
  el.style.background = fill === 'transparent' ? `rgba(248,113,113,${opacity})` : _hex2rgba(fill, opacity);
  if (rot) el.style.transform = `rotate(${rot}deg)`;
}

function _hex2rgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ═══ Properties Panel (right-click) ═══
function _showProps(el, overlay, kind) {
  document.querySelectorAll('.ov-props').forEach(p => p.remove());
  const panel = document.createElement('div');
  panel.className = 'ov-props';
  panel.style.pointerEvents = 'auto';

  const elRect = el.getBoundingClientRect();
  const ovRect = overlay.getBoundingClientRect();
  panel.style.left = Math.min(elRect.left - ovRect.left + 20, ovRect.width - 180) + 'px';
  panel.style.top = Math.min(elRect.bottom - ovRect.top + 4, ovRect.height - 200) + 'px';

  let html = '<div class="props-title">속성</div>';

  if (kind === 'hline' || kind === 'vline') {
    const curW = parseFloat(el.style.borderTopWidth || el.style.borderLeftWidth) || 0.5;
    html += `<label>선 굵기 <input type="range" min="0.5" max="5" step="0.5" value="${curW}" onchange="this.parentElement.querySelector('span').textContent=this.value+'px'" oninput="_setProp(this,'lineWidth')"> <span>${curW}px</span></label>`;
    html += `<label>선 색상 <input type="color" value="#f87171" onchange="_setProp(this,'lineColor')"></label>`;
  }

  if (kind === 'rect') {
    const curW = parseFloat(el.style.borderWidth) || 0.5;
    html += `<label>선 굵기 <input type="range" min="0.5" max="5" step="0.5" value="${curW}" onchange="this.parentElement.querySelector('span').textContent=this.value+'px'" oninput="_setProp(this,'lineWidth')"> <span>${curW}px</span></label>`;
    html += `<label>선 색상 <input type="color" value="#f87171" onchange="_setProp(this,'lineColor')"></label>`;
    html += `<label>채우기 <input type="color" value="#f87171" onchange="_setProp(this,'fillColor')"></label>`;
    html += `<label>투명도 <input type="range" min="0" max="1" step="0.05" value="0.04" oninput="_setProp(this,'fillOpacity')"></label>`;
    html += `<button class="props-btn" onclick="_setProp(this,'clearFill')">채우기 제거</button>`;
    html += `<div class="props-row"><button class="props-btn" onclick="_setProp(this,'rotateL')">↺ 좌회전</button><button class="props-btn" onclick="_setProp(this,'rotateR')">↻ 우회전</button></div>`;
  }

  if (kind === 'anno') {
    html += `<label>글자 색상 <input type="color" value="#e8e9f0" onchange="_setProp(this,'textColor')"></label>`;
  }

  html += `<button class="props-btn" onclick="_setProp(this,'copy')">📋 복사</button>`;
  html += `<button class="props-btn close" onclick="this.closest('.ov-props').remove()">닫기</button>`;

  panel.innerHTML = html;
  panel.dataset.targetType = kind;
  panel._target = el;
  overlay.appendChild(panel);

  // Close on outside click
  setTimeout(() => {
    const close = (ev) => {
      if (!panel.contains(ev.target)) { panel.remove(); document.removeEventListener('mousedown', close, true); }
    };
    document.addEventListener('mousedown', close, true);
  }, 50);
}

function _setProp(input, prop) {
  const panel = input.closest('.ov-props');
  const el = panel._target;
  const overlay = panel.parentElement;
  const kind = panel.dataset.targetType;

  if (prop === 'lineWidth') {
    const v = input.value + 'px dashed ' + (el.style.borderTopColor || el.style.borderLeftColor || el.style.borderColor || '#f87171');
    if (kind==='hline') el.style.borderTop = v;
    else if (kind==='vline') el.style.borderLeft = v;
    else el.style.border = v;
  } else if (prop === 'lineColor') {
    const w = parseFloat(el.style.borderTopWidth||el.style.borderLeftWidth||el.style.borderWidth)||0.5;
    const v = `${w}px dashed ${input.value}`;
    if (kind==='hline') el.style.borderTop = v;
    else if (kind==='vline') el.style.borderLeft = v;
    else el.style.border = v;
  } else if (prop === 'fillColor') {
    const opacity = panel.querySelector('input[type=range][oninput*=fillOpacity]')?.value || 0.1;
    el.style.background = _hex2rgba(input.value, opacity);
  } else if (prop === 'fillOpacity') {
    const colorInput = panel.querySelector('input[type=color][onchange*=fillColor]');
    const c = colorInput?.value || '#f87171';
    el.style.background = _hex2rgba(c, input.value);
  } else if (prop === 'clearFill') {
    el.style.background = 'transparent';
  } else if (prop === 'textColor') {
    el.style.color = input.value;
  } else if (prop === 'rotateL') {
    const cur = parseFloat(el.style.transform?.match(/rotate\((-?\d+)/)?.[1]) || 0;
    el.style.transform = `rotate(${cur - 15}deg)`;
  } else if (prop === 'rotateR') {
    const cur = parseFloat(el.style.transform?.match(/rotate\((-?\d+)/)?.[1]) || 0;
    el.style.transform = `rotate(${cur + 15}deg)`;
  } else if (prop === 'copy') {
    const clone = el.cloneNode(true);
    clone.style.left = (parseFloat(el.style.left)||0) + 15 + 'px';
    clone.style.top = (parseFloat(el.style.top)||0) + 15 + 'px';
    overlay.appendChild(clone);
    // Re-bind events
    const idx = parseInt(overlay.id.replace('overlay-',''));
    clone.querySelector('.ov-close').onmousedown = (e) => { e.stopPropagation(); clone.remove(); };
    _bindDrag(clone, overlay, kind, '.ov-grip');
    if (kind==='rect') {
      const rh = clone.querySelector('.rect-resize');
      if (rh) rh.onmousedown = (e) => {
        e.stopPropagation(); e.preventDefault();
        _drag = { type:'resize', el:clone, startW:clone.offsetWidth, startH:clone.offsetHeight, startX:e.clientX, startY:e.clientY };
      };
    }
    clone.oncontextmenu = (e) => { e.preventDefault(); _showProps(clone, overlay, kind); };
    panel.remove();
    showToast('복사되었습니다');
  }
}

// ── Drag engine ──
function _bindDrag(el, overlay, kind, gripSelector) {
  const grip = el.querySelector(gripSelector);
  if (!grip) return;
  grip.onmousedown = (e) => {
    e.preventDefault(); e.stopPropagation();
    _drag = { type:kind, el, overlay, oRect:overlay.getBoundingClientRect(),
      startX:e.clientX, startY:e.clientY, origLeft:parseFloat(el.style.left)||0, origTop:parseFloat(el.style.top)||0 };
    el.classList.add('dragging');
  };
}

document.addEventListener('mousemove', (e) => {
  if (!_drag) return;
  e.preventDefault();
  if (_drag.type==='resize') {
    _drag.el.style.width = Math.max(30, _drag.startW+e.clientX-_drag.startX)+'px';
    _drag.el.style.height = Math.max(20, _drag.startH+e.clientY-_drag.startY)+'px';
    return;
  }
  const {el,oRect,startX,startY,origLeft,origTop,type}=_drag;
  const dx=e.clientX-startX, dy=e.clientY-startY;
  if (type==='hline') el.style.top = Math.max(0,Math.min(origTop+dy,oRect.height-2))+'px';
  else if (type==='vline') el.style.left = Math.max(0,Math.min(origLeft+dx,oRect.width-2))+'px';
  else { el.style.left=Math.max(0,Math.min(origLeft+dx,oRect.width-30))+'px'; el.style.top=Math.max(0,Math.min(origTop+dy,oRect.height-20))+'px'; }
});
document.addEventListener('mouseup', () => { if(_drag&&_drag.el)_drag.el.classList.remove('dragging'); _drag=null; });

// ═══ Save/Load (per chart) ═══
function exportOverlaysJSON(idx) {
  closeAllMenus();
  const ov = document.getElementById(`overlay-${idx}`);
  if (!ov) return;
  const items = [];
  ov.querySelectorAll('[data-type]').forEach(el => {
    const o = {type:el.dataset.type, left:parseFloat(el.style.left)||0, top:parseFloat(el.style.top)||0};
    if (o.type==='anno') { o.text=el.querySelector('.a-text')?.textContent||''; o.color=el.style.color||''; }
    if (o.type==='rect') { o.width=parseFloat(el.style.width)||100; o.height=parseFloat(el.style.height)||60; o.bg=el.style.background||''; o.border=el.style.border||''; o.transform=el.style.transform||''; }
    if (o.type==='hline') o.borderTop=el.style.borderTop||'';
    if (o.type==='vline') o.borderLeft=el.style.borderLeft||'';
    items.push(o);
  });
  if (!items.length) { showToast('저장할 오버레이가 없습니다'); return; }
  const card = document.querySelector(`.rec-card[data-idx="${idx}"]`);
  const title = card?.querySelector('.rec-title')?.textContent||'chart';
  const blob = new Blob([JSON.stringify(items,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`overlay_${title}_${idx}.json`; a.click();
  showToast(`오버레이 ${items.length}개 저장됨`);
}

function importOverlaysJSON(idx) {
  closeAllMenus();
  const ov = document.getElementById(`overlay-${idx}`);
  if (!ov) return;
  const n = ov.querySelectorAll('[data-type]').length;
  if (n>0 && !confirm(`오버레이 ${n}개가 있습니다. 삭제하고 로드하시겠습니까?`)) return;
  ov.querySelectorAll('[data-type]').forEach(el=>el.remove());
  const input=document.createElement('input'); input.type='file'; input.accept='.json'; input.style.display='none';
  document.body.appendChild(input);
  input.onchange=()=>{
    const file=input.files[0]; document.body.removeChild(input); if(!file)return;
    const r=new FileReader();
    r.onload=(evt)=>{
      try {
        const items=JSON.parse(evt.target.result); if(!Array.isArray(items))throw 0;
        items.forEach(it=>{
          if(it.type==='anno') { addAnno(ov,it.left+8,it.top+28,it.text,{color:it.color}); }
          else if(it.type==='hline') { addHLine(idx,it.top); const last=ov.querySelector('.chart-hline:last-child'); if(last&&it.borderTop) last.style.borderTop=it.borderTop; }
          else if(it.type==='vline') { addVLine(idx,it.left); const last=ov.querySelector('.chart-vline:last-child'); if(last&&it.borderLeft) last.style.borderLeft=it.borderLeft; }
          else if(it.type==='rect') { addRect(idx,it.left,it.top,it.width,it.height); const last=ov.querySelector('.chart-rect:last-child'); if(last){if(it.bg)last.style.background=it.bg; if(it.border)last.style.border=it.border; if(it.transform)last.style.transform=it.transform;} }
        });
        showToast(`오버레이 ${items.length}개 로드됨`);
      } catch(e){ showToast('파일을 읽을 수 없습니다'); }
    };
    r.readAsText(file);
  };
  setTimeout(()=>input.click(),50);
}

function clearOverlays(idx) {
  const ov=document.getElementById(`overlay-${idx}`);
  if(!ov)return;
  const n=ov.querySelectorAll('[data-type]').length;
  if(!n){showToast('제거할 오버레이가 없습니다');return;}
  if(!confirm(`오버레이 ${n}개를 모두 제거하시겠습니까?`))return;
  ov.querySelectorAll('[data-type]').forEach(el=>el.remove());
  showToast(`${n}개 제거됨`);
}

function toggleOverlayVisibility(idx, btn) {
  const ov=document.getElementById(`overlay-${idx}`);
  if(!ov)return;
  const hidden=ov.style.display==='none';
  ov.style.display=hidden?'':'none';
  btn.textContent=hidden?'👁':'🚫';
}

// ═══ charts.js ═══
// ChartForge — charts.js
// ECharts renderers for 31 chart types

function buildEChart(domId, rec, preview) {
  const dom = document.getElementById(domId);
  if (!dom) return;
  const chart = echarts.init(dom, 'chartforge');
  chartInstances.push(chart);

  const m = rec.mapping;
  const rows = preview.data;
  const type = rec.chart_type;

  const getCol   = (name) => rows.map(r => r[name]);
  const getNum   = (name) => rows.map(r => r[name] != null ? Number(r[name]) : null);
  const getClean = (name) => getNum(name).filter(v => v !== null && !isNaN(v));
  const limit    = (arr, n=60) => arr.slice(0, n);
  const agg      = (catCol, numCol, labels) => labels.map(l => {
    const vals = rows.filter(r => String(r[catCol]) === String(l)).map(r => Number(r[numCol])).filter(v => !isNaN(v));
    return vals.length ? +(vals.reduce((s,v)=>s+v,0)/vals.length).toFixed(2) : 0;
  });

  let option = null;

  // ── LINE ──
  if (type === 'line') {
    const xData = limit(getCol(m.x));
    option = {
      tooltip: { trigger: 'axis' },
      legend: { show: m.y.length > 1, bottom: 0 },
      grid: { top: 20, right: 20, bottom: m.y.length > 1 ? 40 : 20, left: 50, containLabel: true },
      xAxis: { type: 'category', data: xData, axisLabel: { rotate: xData.length > 15 ? 30 : 0 } },
      yAxis: { type: 'value' },
      series: m.y.map((col, i) => ({
        name: col, type: 'line', data: limit(getNum(col)),
        smooth: true, symbol: xData.length > 30 ? 'none' : 'circle', symbolSize: 5,
        lineStyle: { width: 2.5, color: C(col) },
        itemStyle: { color: C(col) },
        areaStyle: null,
      })),
    };
  }

  // ── AREA ──
  else if (type === 'area') {
    const xData = limit(getCol(m.x));
    option = {
      tooltip: { trigger: 'axis' },
      legend: { show: true, bottom: 0 },
      grid: { top: 20, right: 20, bottom: 40, left: 50, containLabel: true },
      xAxis: { type: 'category', data: xData },
      yAxis: { type: 'value' },
      series: m.y.map((col, i) => ({
        name: col, type: 'line', data: limit(getNum(col)),
        smooth: true, symbol: 'none',
        lineStyle: { width: 2, color: C(col) },
        itemStyle: { color: C(col) },
        areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
          { offset: 0, color: C(col) + '50' },
          { offset: 1, color: C(col) + '05' },
        ]) },
        stack: 'total',
      })),
    };
  }

  // ── BAR / HORIZONTAL BAR ──
  else if (type === 'bar' || type === 'horizontal_bar') {
    const isHoriz = type === 'horizontal_bar';
    const labels = limit([...new Set(getCol(m.x))], 20);
    const data = agg(m.x, m.y[0], labels);
    const catAxis = { type: 'category', data: labels, axisLabel: { fontSize: 10 } };
    const valAxis = { type: 'value' };
    option = {
      tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
      grid: { top: 15, right: 20, bottom: 20, left: isHoriz ? 80 : 50, containLabel: true },
      xAxis: isHoriz ? valAxis : catAxis,
      yAxis: isHoriz ? catAxis : valAxis,
      series: [{
        type: 'bar', data: data.map((v, i) => ({
          value: v,
          itemStyle: { color: new echarts.graphic.LinearGradient(isHoriz ? 0 : 0, isHoriz ? 0 : 1, isHoriz ? 1 : 0, isHoriz ? 0 : 0, [
            { offset: 0, color: VC(m.x, labels[i]) + 'cc' },
            { offset: 1, color: VC(m.x, labels[i]) },
          ]) },
        })),
        barMaxWidth: 40,
        itemStyle: { borderRadius: isHoriz ? [0, 6, 6, 0] : [6, 6, 0, 0] },
      }],
    };
  }

  // ── STACKED BAR ──
  else if (type === 'stacked_bar') {
    const labels = limit([...new Set(getCol(m.x))], 15);
    const groups = [...new Set(getCol(m.group))].slice(0, 8);
    option = {
      tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
      legend: { show: true, bottom: 0 },
      grid: { top: 15, right: 20, bottom: 40, left: 50, containLabel: true },
      xAxis: { type: 'category', data: labels },
      yAxis: { type: 'value' },
      series: groups.map((g, i) => ({
        name: g, type: 'bar', stack: 'total',
        data: labels.map(l => {
          const vals = rows.filter(r => String(r[m.x])===String(l) && String(r[m.group])===String(g)).map(r=>Number(r[m.y[0]])).filter(v=>!isNaN(v));
          return vals.length ? +(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2) : 0;
        }),
        itemStyle: { color: VC(m.group, g), borderRadius: i === groups.length-1 ? [4,4,0,0] : 0 },
        barMaxWidth: 40,
      })),
    };
  }

  // ── PIE ──
  else if (type === 'pie') {
    const labels = [...new Set(getCol(m.x))].slice(0, 7);
    const data = agg(m.x, m.y[0], labels);
    option = {
      tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
      legend: { orient: 'vertical', right: 10, top: 'center', textStyle: { fontSize: 11 } },
      series: [{
        type: 'pie', radius: ['0%', '70%'], center: ['40%', '50%'],
        data: labels.map((l, i) => ({ value: data[i], name: l, itemStyle: { color: VC(m.x, l) } })),
        label: { show: true, color: '#8b8d9e', fontSize: 10, formatter: '{b}\n{d}%' },
        emphasis: { itemStyle: { shadowBlur: 20, shadowColor: 'rgba(0,0,0,0.3)' } },
        itemStyle: { borderColor: '#12131a', borderWidth: 2, borderRadius: 6 },
      }],
    };
  }

  // ── DOUGHNUT ──
  else if (type === 'doughnut') {
    const labels = [...new Set(getCol(m.x))].slice(0, 7);
    const data = agg(m.x, m.y[0], labels);
    const total = data.reduce((s,v) => s+v, 0);
    option = {
      tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
      legend: { orient: 'vertical', right: 10, top: 'center', textStyle: { fontSize: 11 } },
      graphic: {
        type: 'text', left: '33%', top: '45%',
        style: { text: fmtNum(total), fill: '#e8e9f0', fontSize: 22, fontWeight: 700, fontFamily: "'JetBrains Mono', monospace", textAlign: 'center' },
      },
      series: [{
        type: 'pie', radius: ['48%', '72%'], center: ['40%', '50%'],
        data: labels.map((l, i) => ({ value: data[i], name: l, itemStyle: { color: VC(m.x, l) } })),
        label: { show: false },
        emphasis: { label: { show: true, fontSize: 13, fontWeight: 'bold' }, itemStyle: { shadowBlur: 20 } },
        itemStyle: { borderColor: '#12131a', borderWidth: 3, borderRadius: 8 },
      }],
    };
  }

  // ── SCATTER ──
  else if (type === 'scatter') {
    const xVals = getClean(m.x);
    const yVals = getClean(m.y[0]);
    const pts = limit(xVals.map((x, i) => yVals[i] != null ? [x, yVals[i]] : null).filter(Boolean), 300);
    option = {
      tooltip: { formatter: p => `${m.x}: ${p.value[0]}<br>${m.y[0]}: ${p.value[1]}` },
      grid: { top: 20, right: 30, bottom: 40, left: 55, containLabel: true },
      xAxis: { type: 'value', name: m.x, nameLocation: 'center', nameGap: 28, nameTextStyle: { color: '#8b8d9e', fontSize: 11 } },
      yAxis: { type: 'value', name: m.y[0], nameLocation: 'center', nameGap: 42, nameTextStyle: { color: '#8b8d9e', fontSize: 11 } },
      series: [{
        type: 'scatter', data: pts, symbolSize: 8,
        itemStyle: { color: C(m.y[0]), opacity: 0.7, borderColor: C(m.y[0]), borderWidth: 1 },
        emphasis: { itemStyle: { opacity: 1, shadowBlur: 10, shadowColor: C(m.y[0]) + '80' } },
      }],
    };
  }

  // ── BUBBLE ──
  else if (type === 'bubble') {
    const xVals = getClean(m.x);
    const yVals = getClean(m.y[0]);
    const sCol = m.group;
    const sVals = sCol ? getClean(sCol) : xVals.map(() => 10);
    const maxS = Math.max(...sVals, 1);
    const pts = limit(xVals.map((x, i) => {
      if (yVals[i] == null) return null;
      return [x, yVals[i], sVals[i] || 1];
    }).filter(Boolean), 200);
    option = {
      tooltip: { formatter: p => `${m.x}: ${p.value[0]}<br>${m.y[0]}: ${p.value[1]}${sCol ? '<br>'+sCol+': '+p.value[2] : ''}` },
      grid: { top: 20, right: 30, bottom: 40, left: 55, containLabel: true },
      xAxis: { type: 'value', name: m.x, nameLocation: 'center', nameGap: 28 },
      yAxis: { type: 'value', name: m.y[0], nameLocation: 'center', nameGap: 42 },
      series: [{
        type: 'scatter', data: pts,
        symbolSize: (val) => Math.max(6, (val[2] / maxS) * 50),
        itemStyle: { color: new echarts.graphic.RadialGradient(0.4, 0.3, 1, [
          { offset: 0, color: C(m.y[0]) + 'dd' },
          { offset: 1, color: C(m.y[0]) + '40' },
        ]), opacity: 0.85 },
      }],
    };
  }

  // ── HISTOGRAM ──
  else if (type === 'histogram') {
    const vals = getClean(m.x);
    if (!vals.length) return;
    const bins = 25, min = Math.min(...vals), max = Math.max(...vals);
    const step = (max - min) / bins || 1;
    const counts = Array(bins).fill(0);
    vals.forEach(v => { counts[Math.min(Math.floor((v - min) / step), bins - 1)]++; });
    const labels = counts.map((_, i) => fmtNum(min + step * (i + 0.5)));
    option = {
      tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
      grid: { top: 15, right: 20, bottom: 25, left: 45, containLabel: true },
      xAxis: { type: 'category', data: labels, axisLabel: { rotate: 30, fontSize: 9 } },
      yAxis: { type: 'value', name: '빈도' },
      series: [{
        type: 'bar', data: counts,
        itemStyle: {
          color: new echarts.graphic.LinearGradient(0, 1, 0, 0, [
            { offset: 0, color: C(m.x) + '40' },
            { offset: 1, color: C(m.x) },
          ]),
          borderRadius: [3, 3, 0, 0],
        },
        barCategoryGap: '2%',
      }],
    };
  }

  // ── BOX PLOT (native) ──
  else if (type === 'box') {
    const cats = [...new Set(getCol(m.x))].slice(0, 10);
    const boxData = cats.map(c => {
      const vals = rows.filter(r => String(r[m.x]) === String(c)).map(r => Number(r[m.y[0]])).filter(v => !isNaN(v)).sort((a,b) => a-b);
      if (!vals.length) return [0,0,0,0,0];
      const q = (p) => { const i = p*(vals.length-1); const f = Math.floor(i); return f===i ? vals[f] : vals[f]+(vals[f+1]-vals[f])*(i-f); };
      return [vals[0], q(0.25), q(0.5), q(0.75), vals[vals.length-1]];
    });
    option = {
      tooltip: { trigger: 'item', formatter: p => {
        const d = p.data;
        return `${p.name}<br>최솟값: ${d[1]}<br>Q1: ${d[2]}<br>중앙값: ${d[3]}<br>Q3: ${d[4]}<br>최댓값: ${d[5]}`;
      }},
      grid: { top: 20, right: 20, bottom: 25, left: 50, containLabel: true },
      xAxis: { type: 'category', data: cats },
      yAxis: { type: 'value', name: m.y[0] },
      series: [{
        type: 'boxplot',
        data: boxData.map((bd, i) => ({
          value: bd,
          itemStyle: { color: VC(m.x, cats[i]) + '30', borderColor: VC(m.x, cats[i]), borderWidth: 2 },
        })),
        emphasis: { itemStyle: { borderWidth: 2.5 } },
      }],
    };
  }

  // ── RADAR ──
  else if (type === 'radar') {
    const labelCol = m.x;
    const axes = m.y.slice(0, 8);
    const entities = [...new Set(getCol(labelCol))].slice(0, 5);
    const axisRanges = {};
    axes.forEach(a => { const v = getClean(a); axisRanges[a] = { min: Math.min(...v), max: Math.max(...v) }; });
    option = {
      tooltip: {},
      legend: { show: true, bottom: 0, textStyle: { fontSize: 10 } },
      radar: {
        indicator: axes.map(a => ({ name: a, max: 100 })),
        shape: 'polygon',
        splitArea: { areaStyle: { color: ['#1a1b2440', '#22232e40'] } },
        axisLine: { lineStyle: { color: '#2a2b3850' } },
        splitLine: { lineStyle: { color: '#2a2b3840' } },
        axisName: { color: '#8b8d9e', fontSize: 10 },
      },
      series: [{
        type: 'radar',
        data: entities.map((ent, i) => {
          const entRows = rows.filter(r => String(r[labelCol]) === String(ent));
          const values = axes.map(a => {
            const vals = entRows.map(r => Number(r[a])).filter(v => !isNaN(v));
            const avg = vals.length ? vals.reduce((s,v)=>s+v,0)/vals.length : 0;
            const range = axisRanges[a].max - axisRanges[a].min || 1;
            return Math.round((avg - axisRanges[a].min) / range * 100);
          });
          return {
            name: String(ent), value: values,
            lineStyle: { color: VC(labelCol, ent), width: 2 },
            areaStyle: { color: VC(labelCol, ent) + '25' },
            itemStyle: { color: VC(labelCol, ent) },
          };
        }),
      }],
    };
  }

  // ── HEATMAP (native) ──
  else if (type === 'heatmap') {
    const numCols = preview.columns.filter(c => {
      const v = rows.slice(0, 10).map(r => Number(r[c]));
      return v.some(v2 => !isNaN(v2));
    }).slice(0, 8);

    const data = [];
    let minVal = 1, maxVal = -1;
    numCols.forEach((c1, i) => {
      numCols.forEach((c2, j) => {
        const v1 = rows.map(r => Number(r[c1])).filter(v => !isNaN(v));
        const v2 = rows.map(r => Number(r[c2])).filter(v => !isNaN(v));
        const len = Math.min(v1.length, v2.length);
        const corr = len > 2 ? pearson(v1.slice(0,len), v2.slice(0,len)) : 0;
        data.push([i, j, +corr.toFixed(2)]);
        if (corr < minVal) minVal = corr;
        if (corr > maxVal) maxVal = corr;
      });
    });
    option = {
      tooltip: { formatter: p => `${numCols[p.value[0]]} × ${numCols[p.value[1]]}<br>상관계수: ${p.value[2]}` },
      grid: { top: 10, right: 80, bottom: 50, left: 80, containLabel: true },
      xAxis: { type: 'category', data: numCols, axisLabel: { rotate: 30, fontSize: 9 }, splitArea: { show: true, areaStyle: { color: ['#1a1b2420','#12131a20'] } } },
      yAxis: { type: 'category', data: numCols, axisLabel: { fontSize: 9 }, splitArea: { show: true, areaStyle: { color: ['#1a1b2420','#12131a20'] } } },
      visualMap: {
        min: -1, max: 1, calculable: true,
        orient: 'vertical', right: 0, top: 'center',
        textStyle: { color: '#8b8d9e', fontSize: 10 },
        inRange: { color: ['#f87171', '#2a2b38', '#4f7df9'] },
        itemHeight: 160,
      },
      series: [{
        type: 'heatmap', data: data,
        label: { show: true, color: '#e8e9f0', fontSize: 10, formatter: p => p.value[2].toFixed(2) },
        emphasis: { itemStyle: { shadowBlur: 10, shadowColor: 'rgba(0,0,0,0.5)' } },
      }],
    };
  }

  // ── SANKEY ──
  else if (type === 'sankey' && rec.sankey_data) {
    const sd = rec.sankey_data;

    // Calculate threshold: top 30% of link values show labels
    const linkValues = sd.links.map(l => l.value).sort((a, b) => b - a);
    const thresholdIdx = Math.max(1, Math.floor(linkValues.length * 0.3));
    const labelThreshold = linkValues[Math.min(thresholdIdx, linkValues.length - 1)] || 0;

    option = {
      tooltip: {
        trigger: 'item',
        formatter: p => {
          if (p.dataType === 'edge') {
            const s = p.data.source.split(':').slice(1).join(':');
            const t = p.data.target.split(':').slice(1).join(':');
            return `${s} → ${t}<br>값: ${fmtNum(p.data.value)}`;
          }
          return p.data.name.split(':').slice(1).join(':');
        },
      },
      series: [{
        type: 'sankey',
        layout: 'none',
        left: 40, right: 40, top: 15, bottom: 15,
        nodeWidth: 18,
        nodeGap: 10,
        orient: 'horizontal',
        draggable: true,
        focusNodeAdjacency: 'allEdges',
        data: sd.nodes.map(n => {
          const colName = n.name.split(':')[0];
          const val = n.name.split(':').slice(1).join(':');
          return {
            name: n.name,
            itemStyle: { color: VC(colName, val), borderColor: '#12131a', borderWidth: 1 },
            label: { show: true, color: '#e8e9f0', fontSize: 10, formatter: p => p.name.split(':').slice(1).join(':') },
          };
        }),
        links: sd.links.map(l => ({
          source: l.source,
          target: l.target,
          value: l.value,
          lineStyle: {
            color: 'gradient',
            opacity: l.value >= labelThreshold ? 0.45 : 0.25,
          },
          label: {
            show: l.value >= labelThreshold,
            position: 'middle',
            formatter: () => fmtNum(l.value),
            fontSize: 10,
            fontFamily: "'JetBrains Mono', monospace",
            fontWeight: 600,
            color: '#e8e9f0',
            textBorderColor: '#0a0b0f',
            textBorderWidth: 2.5,
            padding: [2, 6],
            backgroundColor: '#12131acc',
            borderRadius: 4,
          },
        })),
        emphasis: {
          lineStyle: { opacity: 0.7 },
        },
        lineStyle: { curveness: 0.5 },
        label: { position: 'right' },
      }],
    };
  }

  // ── NIGHTINGALE ROSE ──
  else if (type === 'nightingale') {
    const labels = [...new Set(getCol(m.x))].slice(0, 8);
    const data = agg(m.x, m.y[0], labels);
    option = {
      tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
      legend: { show: false },
      series: [{
        type: 'pie', roseType: 'area',
        radius: ['18%', '72%'], center: ['50%', '52%'],
        data: labels.map((l, i) => ({ value: data[i], name: l, itemStyle: { color: VC(m.x, l) } })),
        label: { color: '#8b8d9e', fontSize: 10, formatter: '{b}\n{d}%' },
        itemStyle: { borderColor: '#12131a', borderWidth: 2, borderRadius: 6 },
        emphasis: { itemStyle: { shadowBlur: 15, shadowColor: 'rgba(0,0,0,0.4)' } },
      }],
    };
  }

  // ── FUNNEL ──
  else if (type === 'funnel') {
    const labels = [...new Set(getCol(m.x))].slice(0, 8);
    const data = agg(m.x, m.y[0], labels);
    // Sort descending for funnel effect
    const paired = labels.map((l, i) => ({ name: l, value: data[i] })).sort((a, b) => b.value - a.value);
    option = {
      tooltip: { trigger: 'item', formatter: '{b}: {c}' },
      series: [{

  // ── POLAR BAR ──
  else if (type === 'polar_bar') {
    const labels = [...new Set(getCol(m.x))].slice(0, 10);
    const data = agg(m.x, m.y[0], labels);
    option = {
      tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },

      radiusAxis: { axisLine: { show: false }, axisTick: { show: false },
                    axisLabel: { color: '#8b8d9e', fontSize: 9 },
                    splitLine: { lineStyle: { color: '#2a2b3830' } } },
      polar: { radius: ['12%', '78%'] },
      series: [{
        type: 'bar', coordinateSystem: 'polar',
        data: data.map((v, i) => ({
          value: v,
          itemStyle: { color: VC(m.x, labels[i]) },
